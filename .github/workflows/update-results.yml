name: Actualizar resultados Mundial 2026

on:
  schedule:
    # Cada 30 minutos. GitHub usa hora UTC.
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-results:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Actualizar data.json desde APIs
        run: node update.js

      - name: Guardar cambios si data.json cambió
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "Actualizar resultados Mundial 2026"
          git push
