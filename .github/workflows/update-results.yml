name: Actualizar resultados Mundial 2026

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: actualizar-resultados-mundial-2026
  cancel-in-progress: false

jobs:
  update-results:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sincronizar rama main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - name: Actualizar data.json desde football-data.org
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node update.js

      - name: Guardar cambios si data.json cambió
        run: |
          git add data.json

          if git diff --cached --quiet; then
            echo "No hubo cambios en data.json."
          else
            git commit -m "Actualizar resultados Mundial 2026"
            git pull --rebase origin main
            git push origin main
          fi
